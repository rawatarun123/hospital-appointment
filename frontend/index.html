<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HASO</title>
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f0f0f0;margin:0;padding:14px}
.box{background:#fff;padding:16px;border-radius:8px;max-width:820px;margin:8px auto;border:1px solid #ddd}
h2{color:#0070f3;margin-top:0}
input,select,textarea{width:100%;padding:7px;margin:3px 0 9px;border:1px solid #ccc;border-radius:4px;font-size:13px}
button{padding:6px 13px;background:#0070f3;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;margin:2px}
button:hover{opacity:.85}.r{background:#dc2626}.g{background:#16a34a}.gr{background:#6b7280;font-size:12px}
.n{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.n button{background:#e5e7eb;color:#111}.n button.a{background:#0070f3;color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#0070f3;color:#fff;padding:7px;text-align:left}td{padding:6px 8px;border-bottom:1px solid #eee}
tr:hover td{background:#f9f9f9}
.m{padding:8px;border-radius:4px;margin:6px 0;font-size:13px}
.ok{background:#d1fae5;color:#065f46}.er{background:#fee2e2;color:#991b1b}.wn{background:#fef3c7;color:#92400e}
.bd{padding:2px 7px;border-radius:12px;font-size:11px;font-weight:bold}
.b1{background:#dbeafe;color:#1d4ed8}.b2{background:#d1fae5;color:#065f46}.b3{background:#fef3c7;color:#92400e}.b4{background:#fee2e2;color:#991b1b}
.h{display:none}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:12px;font-weight:bold;color:#555}
</style>
</head>
<body>
<div id="pg-public"><div class="box"><h2>🏥 HASO — Hospital Appointment System</h2>
<div class="n"><button onclick="sw('s1')" class="a" id="nb1">1. Doctor</button><button onclick="sw('s2')" id="nb2">2. Details</button><button onclick="sw('s3')" id="nb3">3. Confirm</button><button onclick="pg('check')" class="gr">My Appointments</button><button onclick="pg('login')" class="gr">Login</button></div>
<div id="s1"><label>Specialty: <select id="spec" onchange="loadD()" style="width:auto;display:inline-block;margin-right:8px"></select></label> <label>Date: <input type="date" id="bdate" style="width:auto;display:inline-block"/></label><div id="dl" style="display:flex;flex-wrap:wrap;gap:7px;margin:10px 0"></div><button onclick="gs(2)" id="btn2" disabled>Next →</button></div>
<div id="s2" class="h"><div class="g2"><div><label>Full Name *</label><input id="pn" placeholder="Your name"/></div><div><label>Age *</label><input id="pa" type="number" placeholder="Age"/></div></div><div class="g2"><div><label>Phone *</label><input id="pp" placeholder="Mobile"/></div><div><label>Email</label><input id="pe" placeholder="Optional"/></div></div><label>Symptoms * — your slot is assigned automatically based on this</label><textarea id="ps" placeholder="e.g. chest pain, high fever, routine checkup..." oninput="showU()"></textarea><div id="um"></div><div class="m wn">No need to pick a time — it is auto-assigned from your symptoms.</div><button onclick="gs(1)">← Back</button><button onclick="gs(3)">Next →</button></div>
<div id="s3" class="h"><div id="sum" class="m ok"></div><button onclick="gs(2)">← Back</button><button onclick="book()" id="cb">✓ Confirm & Book</button></div>
</div></div>

<div id="pg-check" class="h"><div class="box"><h2>📋 My Appointments</h2>
<div style="display:flex;gap:8px"><input id="cp" placeholder="Enter your phone number" style="flex:1"/><button onclick="chk()">Search</button></div><div id="cr" style="margin-top:10px"></div><br><button onclick="pg('public')" class="gr">← Back</button>
</div></div>

<div id="pg-login" class="h"><div class="box" style="max-width:370px"><h2>🔐 Login</h2>
<label>Username</label><input id="lu" autocomplete="off"/><label>Password</label><input id="lp" type="password"/>
<button onclick="login()" style="width:100%;margin-top:4px">Sign In</button><div id="le" class="m er h"></div>
<div class="m wn" style="font-size:12px">admin/admin123 | drpatel/doc123 | alice/pat123</div>
<button onclick="pg('public')" class="gr" style="margin-top:6px">← Back</button>
</div></div>

<div id="pg-admin" class="h"><div class="box"><h2>📊 Admin Dashboard</h2>
<div class="n"><button onclick="an('aov')" class="a">Overview</button><button onclick="an('aap')">Appointments</button><button onclick="an('adc')">Doctors</button><button onclick="an('apt')">Patients</button><button onclick="an('aus')">Users</button><button onclick="an('aad')">+ Add Doctor</button><button class="r" onclick="lo()">Sign Out</button></div>
<div id="aov"><div id="as" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"></div><div id="aq"></div></div>
<div id="aap" class="h"><div style="display:flex;gap:6px;margin-bottom:8px"><input type="date" id="fd" onchange="laa()" style="width:auto"/><select id="fs" onchange="laa()" style="width:auto"><option value="">All</option><option value="booked">Booked</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select><button onclick="fd.value=fs.value='';laa()" class="gr">Clear</button></div><div id="at"></div></div>
<div id="adc" class="h"><div id="dt"></div></div>
<div id="apt" class="h"><div id="pt"></div></div>
<div id="aus" class="h"><div id="ut"></div></div>
<div id="aad" class="h"><div class="g2"><div><label>Name *</label><input id="dn"/></div><div><label>Specialty</label><select id="ds"><option>Cardiology</option><option>Neurology</option><option>Orthopedics</option><option>General</option><option>Pediatrics</option><option>Dermatology</option><option>Gynecology</option><option>ENT</option><option>Psychiatry</option></select></div></div><div class="g2"><div><label>Start</label><input id="dst" type="time" value="09:00"/></div><div><label>End</label><input id="det" type="time" value="17:00"/></div></div><div class="g2"><div><label>Slot (min)</label><select id="dsl"><option value="20">20</option><option value="30" selected>30</option><option value="45">45</option><option value="60">60</option></select></div><div><label>Fee (Rs)</label><input id="df" type="number" value="300"/></div></div><button onclick="addD()">Add Doctor</button><span id="dm" style="color:green;margin-left:8px;font-size:13px"></span></div>
</div></div>

<div id="pg-doctor" class="h"><div class="box"><h2>👨‍⚕️ Doctor Portal</h2>
<div class="n"><button onclick="dn('da')" class="a">My Appointments</button><button onclick="dn('dp')">My Patients</button><button class="r" onclick="lo()">Sign Out</button></div>
<div style="display:flex;gap:6px;margin-bottom:8px"><input type="date" id="dfd" onchange="lda()" style="width:auto"/><button onclick="dfd.value='';lda()" class="gr">All</button></div>
<div id="da"><div id="dat"></div></div><div id="dp" class="h"><div id="dpt"></div></div>
</div></div>

<div id="pg-patient" class="h"><div class="box"><h2>🧑 Patient Portal</h2>
<div class="n"><button onclick="pn('pa')" class="a">My Appointments</button><button onclick="pn('pb')">Book Appointment</button><button class="r" onclick="lo()">Sign Out</button></div>
<div id="pa"><div id="pat"></div></div>
<div id="pb" class="h"><div class="g2"><div><label>Specialty</label><select id="pbs" onchange="lpd()"></select></div><div><label>Date</label><input type="date" id="pbd"/></div></div><div id="pbd2" style="display:flex;flex-wrap:wrap;gap:7px;margin:8px 0"></div><label>Symptoms * (time assigned from this)</label><textarea id="pbsy" placeholder="Describe your symptoms..."></textarea><div class="m wn">Time is auto-assigned — no need to pick.</div><button onclick="pb()">Book Appointment</button><div id="pbr" style="margin-top:8px"></div></div>
</div></div>

<script>
const A='/api';let T=localStorage.getItem('tok'),U=JSON.parse(localStorage.getItem('usr')||'null'),BD=null,PD=null,PDS=[];
async function R(p,o={}){const r=await fetch(A+p,{headers:{'Content-Type':'application/json',...(T?{Authorization:'Bearer '+T}:{})}, ...o});const d=await r.json();if(!r.ok)throw d;return d}
function pg(p){document.querySelectorAll('[id^="pg-"]').forEach(e=>e.className='h');document.getElementById('pg-'+p).className='';if(p==='public')ini();if(p==='check')cr.innerHTML=''}
function sw(s){['s1','s2','s3'].forEach(x=>document.getElementById(x).className='h');document.getElementById(s).className='';['nb1','nb2','nb3'].forEach((b,i)=>document.getElementById(b).className=s==='s'+(i+1)?'a':'')}
function an(s){['aov','aap','adc','apt','aus','aad'].forEach(x=>document.getElementById(x).className='h');document.getElementById(s).className='';({aov:lov,aap:laa,adc:lad,apt:lap,aus:lau})[s]?.()}
function dn(s){['da','dp'].forEach(x=>document.getElementById(x).className='h');document.getElementById(s).className='';if(s==='dp')ldp()}
function pn(s){['pa','pb'].forEach(x=>document.getElementById(x).className='h');document.getElementById(s).className='';if(s==='pa')lpa();if(s==='pb')ipb()}
function sb(s){return`<span class="bd ${{booked:'b1',completed:'b2',on_leave:'b3',available:'b2',cancelled:'b4',removed:'b4',active:'b2',inactive:'b4',admin:'b4',doctor:'b1',patient:'b2'}[s]||'b3'}">${s}</span>`}
function ut(u){u=+u||1;return`<span class="bd ${['','b2','b3','b4'][u]}">${['','Low','Med','High'][u]}</span>`}
function td(){return new Date().toISOString().split('T')[0]}
function tbl(h,r){return`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r}</table>`}
function done(id,btn,c){R('/admin/appointments/'+id,{method:'PUT',body:JSON.stringify({status:'completed'})}).then(()=>{btn.closest('tr').cells[c].innerHTML=sb('completed');btn.remove()})}

async function ini(){bdate.min=bdate.value=td();const s=await R('/specialties').catch(()=>[]);spec.innerHTML='<option value="">All</option>';s.forEach(x=>spec.innerHTML+=`<option>${x}</option>`);loadD()}
async function loadD(){const sp=spec.value;PDS=await R('/doctors?status=available'+(sp?'&specialty='+sp:'')).catch(()=>[]);dl.innerHTML=PDS.map(d=>`<div id="dc${d.ID}" onclick="BD=PDS.find(x=>x.ID==${d.ID});document.querySelectorAll('[id^=dc]').forEach(e=>e.style.borderColor='#ccc');this.style.borderColor='#0070f3';btn2.disabled=false" style="border:2px solid #ccc;border-radius:6px;padding:9px;cursor:pointer;min-width:155px"><b>${d.Name}</b><br><small>${d.Specialization}</small><br><small>${String(d.Start_Time).slice(0,5)}-${String(d.End_Time).slice(0,5)} | ${d.Slot_Duration}min | Rs.${d.Fee||0}</small></div>`).join('')}
function gs(n){if(n===3){if(!pn_.value||!pp.value||!pa.value||!ps.value){alert('Fill all required fields.');return}sum.innerHTML=`Name: <b>${pn_.value}</b> (Age ${pa.value}) | Phone: ${pp.value}<br>Doctor: <b>${BD.Name}</b> - ${BD.Specialization}<br>Date: ${bdate.value}<br>Symptoms: ${ps.value.slice(0,80)}`}sw('s'+n)}
async function showU(){const t=ps.value;if(t.length<10){um.innerHTML='';return}try{const r=await R('/scheduler/analyze',{method:'POST',body:JSON.stringify({symptoms:t,age:30})});um.innerHTML=`<div class="m ${r.urgency==3?'er':r.urgency==2?'wn':'ok'}">${r.urgency_label} Urgency — ${r.message}</div>`}catch{}}
async function book(){cb.textContent='Booking...';cb.disabled=true;try{const r=await R('/book',{method:'POST',body:JSON.stringify({patient_name:pn_.value,patient_age:+pa.value,patient_phone:pp.value,patient_email:pe.value,symptoms:ps.value,doctor_id:BD.ID,appt_date:bdate.value})});document.getElementById('s3').innerHTML=`<div class="m ok"><b>✅ Confirmed!</b><br>Doctor: ${r.doctor} | Date: ${r.date} | Time: <b>${r.time}</b><br>Urgency: ${r.urgency} | Priority: ${r.priority}/10<br><small>Save your phone to check/cancel later.</small></div><button onclick="location.reload()">Book Another</button><button onclick="pg('check')" class="gr">View Appointments</button>`}catch(e){alert(e.error||'Failed');cb.textContent='✓ Confirm & Book';cb.disabled=false}}
async function chk(){const ph=cp.value.trim();if(!ph){alert('Enter phone.');return}const rows=await R('/appointments/check?phone='+encodeURIComponent(ph)).catch(()=>[]);cr.innerHTML=!rows.length?'<div class="m wn">No appointments found.</div>':tbl(['Doctor','Specialty','Date','Time','Urgency','Status',''],rows.map(a=>`<tr><td>${a.doctor_name}</td><td>${a.specialty}</td><td>${a.appt_date}</td><td><b>${a.appt_time}</b></td><td>${ut(a.urgency)}</td><td>${sb(a.status)}</td><td>${a.status==='booked'?`<button class="r" onclick="R('/appointments/${a.id}/cancel',{method:'POST'}).then(()=>{this.closest('tr').cells[5].innerHTML=sb('cancelled');this.remove()})">Cancel</button>`:''}</td></tr>`).join(''))}
async function login(){try{const r=await R('/auth/login',{method:'POST',body:JSON.stringify({username:lu.value.trim(),password:lp.value})});T=r.token;U=r.user;localStorage.setItem('tok',T);localStorage.setItem('usr',JSON.stringify(U));if(U.role==='admin'){pg('admin');lov()}else if(U.role==='doctor'){pg('doctor');lda()}else{pg('patient');lpa()}}catch{le.className='m er';le.textContent='Wrong credentials.'}}
lp.addEventListener('keydown',e=>{if(e.key==='Enter')login()});
function lo(){T=null;U=null;localStorage.removeItem('tok');localStorage.removeItem('usr');location.reload()}

async function lov(){const s=await R('/analytics/overview').catch(()=>({}));as_.innerHTML=[['Total',s.total_appointments],['Today',s.today],['Active',s.booked],['Urgent',s.high_urgency],['Doctors',s.total_doctors],['Patients',s.total_patients]].map(([l,v])=>`<div style="background:#f0f4ff;border-radius:6px;padding:10px 16px;text-align:center"><b style="font-size:22px;color:#0070f3">${v||0}</b><br><small>${l}</small></div>`).join('');const ap=await R('/admin/appointments?date='+td()).catch(()=>[]);aq.innerHTML='<b>Today Queue (by Priority)</b><br><br>'+(!ap.length?'<div class="m wn">No appointments today.</div>':tbl(['Pri','Patient','Phone','Doctor','Time','Urgency','Status',''],ap.map(a=>`<tr><td><b>${a.Priority}/10</b></td><td>${a.Patient_Name}</td><td>${a.Patient_Phone}</td><td>${a.Doctor_Name}</td><td><b>${a.Appt_Time}</b></td><td>${ut(a.Urgency)}</td><td>${sb(a.Status)}</td><td>${a.Status==='booked'?`<button class="g" onclick="done(${a.ID},this,6)">Done</button>`:''}</td></tr>`).join('')))}
async function laa(){let u='/admin/appointments';const p=[];if(fd.value)p.push('date='+fd.value);if(fs.value)p.push('status='+fs.value);if(p.length)u+='?'+p.join('&');const rows=await R(u).catch(()=>[]);at.innerHTML=!rows.length?'<div class="m wn">No appointments.</div>':tbl(['ID','Patient','Phone','Doctor','Date','Time','Urgency','Pri','Status',''],rows.map(a=>`<tr><td>${a.ID}</td><td>${a.Patient_Name}</td><td>${a.Patient_Phone}</td><td>${a.Doctor_Name}</td><td>${a.Appt_Date}</td><td><b>${a.Appt_Time}</b></td><td>${ut(a.Urgency)}</td><td>${a.Priority}</td><td>${sb(a.Status)}</td><td style="white-space:nowrap">${a.Status==='booked'?`<button class="g" style="padding:3px 7px;font-size:11px" onclick="done(${a.ID},this,8)">Done</button>`:''}<button class="r" style="padding:3px 7px;font-size:11px" onclick="R('/admin/appointments/${a.ID}',{method:'DELETE'}).then(()=>this.closest('tr').remove())">X</button></td></tr>`).join(''))}
async function lad(){const docs=await R('/admin/doctors').catch(()=>[]);dt.innerHTML=tbl(['Name','Specialty','Hours','Slot','Fee','Status',''],docs.map(d=>`<tr><td>${d.Name}</td><td>${d.Specialization}</td><td>${String(d.Start_Time).slice(0,5)}-${String(d.End_Time).slice(0,5)}</td><td>${d.Slot_Duration}min</td><td>Rs.${d.Fee||0}</td><td>${sb(d.Status)}</td><td style="white-space:nowrap">${d.Status==='available'?`<button class="gr" onclick="R('/admin/doctors/${d.ID}',{method:'PUT',body:JSON.stringify({Status:'on_leave'})}).then(lad)">On Leave</button>`:d.Status==='on_leave'?`<button class="g" onclick="R('/admin/doctors/${d.ID}',{method:'PUT',body:JSON.stringify({Status:'available'})}).then(lad)">Restore</button>`:''} ${d.Status!=='removed'?`<button class="r" onclick="confirm('Remove?')&&R('/admin/doctors/${d.ID}',{method:'DELETE'}).then(lad)">Remove</button>`:''}</td></tr>`).join(''))}
async function addD(){const n=dn_.value.trim();if(!n){alert('Enter name.');return}await R('/admin/doctors',{method:'POST',body:JSON.stringify({name:n,specialization:ds.value,start_time:dst.value,end_time:det.value,slot_duration:dsl.value,fee:df.value})});dn_.value='';dm.textContent='✓ Added!';setTimeout(()=>dm.textContent='',3000)}
async function lap(){const p=await R('/admin/patients').catch(()=>[]);pt.innerHTML=tbl(['Name','Age','Phone','Blood','History','Status'],p.map(x=>`<tr><td>${x.Name}</td><td>${x.Age||'-'}</td><td>${x.Phone}</td><td>${x.Blood_Group||'-'}</td><td style="font-size:11px">${(x.Medical_History||'None').slice(0,40)}</td><td>${sb(x.Status||'active')}</td></tr>`).join(''))}
async function lau(){const u=await R('/admin/users').catch(()=>[]);ut_.innerHTML=tbl(['ID','Username','Name','Role','Phone','Status',''],u.map(x=>`<tr><td>${x.ID}</td><td>${x.Username}</td><td>${x.Name}</td><td>${sb(x.Role)}</td><td>${x.Phone||'-'}</td><td>${sb(x.Status)}</td><td>${x.Status==='active'?`<button class="r" onclick="R('/admin/users/${x.ID}',{method:'PUT',body:JSON.stringify({status:'inactive'})}).then(lau)">Deactivate</button>`:`<button class="g" onclick="R('/admin/users/${x.ID}',{method:'PUT',body:JSON.stringify({status:'active'})}).then(lau)">Activate</button>`}</td></tr>`).join(''))}

async function lda(){const d=dfd.value;const r=await R('/doctor/appointments'+(d?'?date='+d:'')).catch(()=>[]);dat.innerHTML=!r.length?'<div class="m wn">No appointments.</div>':tbl(['Patient','Phone','Date','Time','Urgency','Pri','Status',''],r.map(a=>`<tr><td>${a.Patient_Name}</td><td>${a.Patient_Phone}</td><td>${a.Appt_Date}</td><td><b>${a.Appt_Time}</b></td><td>${ut(a.Urgency)}</td><td>${a.Priority}/10</td><td>${sb(a.Status)}</td><td>${a.Status==='booked'?`<button class="g" style="padding:3px 7px;font-size:11px" onclick="done(${a.ID},this,6)">Done</button>`:''}</td></tr>`).join(''))}
async function ldp(){const r=await R('/doctor/appointments').catch(()=>[]);dpt.innerHTML=!r.length?'<div class="m wn">No patients.</div>':tbl(['Patient','Phone','Date','Urgency','Status'],r.map(a=>`<tr><td>${a.Patient_Name}</td><td>${a.Patient_Phone}</td><td>${a.Appt_Date}</td><td>${ut(a.Urgency)}</td><td>${sb(a.Status)}</td></tr>`).join(''))}
async function lpa(){const r=await R('/patient/appointments').catch(()=>[]);pat.innerHTML=!r.length?'<div class="m wn">No appointments.</div>':tbl(['Doctor','Specialty','Date','Time','Urgency','Pri','Status',''],r.map(a=>`<tr><td>${a.Doctor_Name}</td><td>${a.Specialty}</td><td>${a.Appt_Date}</td><td><b>${a.Appt_Time}</b></td><td>${ut(a.Urgency)}</td><td>${a.Priority}/10</td><td>${sb(a.Status)}</td><td>${a.Status==='booked'?`<button class="r" onclick="confirm('Cancel?')&&R('/appointments/${a.ID}/cancel',{method:'POST'}).then(()=>{this.closest('tr').cells[6].innerHTML=sb('cancelled');this.remove()})">Cancel</button>`:''}</td></tr>`).join(''))}
async function ipb(){pbd.min=pbd.value=td();const s=await R('/specialties').catch(()=>[]);pbs.innerHTML='<option value="">All</option>';s.forEach(x=>pbs.innerHTML+=`<option>${x}</option>`);lpd()}
async function lpd(){PD=null;const docs=await R('/doctors?status=available'+(pbs.value?'&specialty='+pbs.value:'')).catch(()=>[]);pbd2.innerHTML=docs.map(d=>`<div onclick="PD=JSON.parse(this.dataset.d);pbd2.querySelectorAll('div').forEach(e=>e.style.borderColor='#ccc');this.style.borderColor='#0070f3'" data-d='${JSON.stringify(d).replace(/'/g,"&#39;")}' style="border:2px solid #ccc;border-radius:6px;padding:9px;cursor:pointer;min-width:150px"><b>${d.Name}</b><br><small>${d.Specialization}</small><br><small>Rs.${d.Fee||0}</small></div>`).join('')}
async function pb(){if(!PD){alert('Choose a doctor.');return}const sy=pbsy.value.trim();if(!sy){alert('Describe symptoms.');return}try{const pr=await R('/patient/profile').catch(()=>null);const r=await R('/book',{method:'POST',body:JSON.stringify({patient_name:pr?.Name||U?.name||'',patient_age:pr?.Age||0,patient_phone:pr?.Phone||'',symptoms:sy,doctor_id:PD.ID,appt_date:pbd.value})});pbr.innerHTML=`<div class="m ok">✅ Booked! <b>${r.doctor}</b> — ${r.date} at <b>${r.time}</b> | Urgency: ${r.urgency} | Priority: ${r.priority}/10</div>`}catch(e){pbr.innerHTML=`<div class="m er">${e.error||'Failed'}</div>`}}

// ID shorthands — must come after DOM is parsed
document.addEventListener('DOMContentLoaded',()=>{
  window.pn_=document.getElementById('pn');
  window.as_=document.getElementById('as');
  window.dn_=document.getElementById('dn');
  window.ut_=document.getElementById('ut');
  window.fd=document.getElementById('fd');
  window.fs=document.getElementById('fs');
});
window.onload=()=>{if(T&&U){if(U.role==='admin'){pg('admin');lov()}else if(U.role==='doctor'){pg('doctor');lda()}else{pg('patient');lpa()}}else ini()};
</script>
</body>
</html>
